<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Escuelas de Escalada</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/style.css" />
  <meta name="robots" content="noindex">
</head>
<body>

  <!-- Mapa -->
  <div id="map"></div>

  <!-- Sidebar (se oculta al abrir detalle en móvil) -->
  <div id="sidebar" class="sidebar open">
    <div class="sidebar-header">
      <h1>🧗 Escuelas de Escalada</h1>
      <button id="sidebar-close" class="sidebar-close" title="Ocultar escuelas">✕</button>
    </div>
    <div class="filter-bar" id="filter-bar">
      <button id="filter-toggle" class="filter-toggle" title="Ocultar filtro">▼</button>
      <label for="orientation-filter">Orientación:</label>
      <select id="orientation-filter">
        <option value="">Todas</option>
        <option value="N">N</option>
        <option value="NE">NE</option>
        <option value="E">E</option>
        <option value="SE">SE</option>
        <option value="S">S</option>
        <option value="SW">SW</option>
        <option value="W">W</option>
        <option value="NW">NW</option>
      </select>
    </div>
    <div id="school-list" class="school-list">
      <div class="loading">Cargando...</div>
    </div>
  </div>

  <!-- Botón para mostrar sidebar -->
  <button id="sidebar-toggle" class="sidebar-toggle" title="Mostrar escuelas">☰ Escuelas</button>

  <!-- Panel de detalles (bottom sheet) -->
  <div id="detail-panel" class="detail-panel">
  </div>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox">
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/app.js?v=6"></script>
</body>
</html>
