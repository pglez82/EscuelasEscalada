<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Escuelas de Escalada</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/style.css" />
  <meta name="robots" content="noindex">
</head>
<body>

  <!-- Mapa -->
  <div id="map"></div>

  <!-- Sidebar (se oculta al abrir detalle en móvil) -->
  <div id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <h1>🧗 Escuelas de Escalada</h1>
      <button id="sidebar-close" class="sidebar-close" title="Ocultar escuelas">✕</button>
    </div>
    <button id="filter-toggle" class="filter-toggle" title="Mostrar filtro">▼</button>
    <div class="filter-bar" id="filter-bar">
      <span class="filter-label">Orientación:</span>
      <div class="orientation-checks" id="orientation-filters">
        <label><input type="checkbox" value="N"> N</label>
        <label><input type="checkbox" value="NE"> NE</label>
        <label><input type="checkbox" value="E"> E</label>
        <label><input type="checkbox" value="SE"> SE</label>
        <label><input type="checkbox" value="S"> S</label>
        <label><input type="checkbox" value="SW"> SW</label>
        <label><input type="checkbox" value="W"> W</label>
        <label><input type="checkbox" value="NW"> NW</label>
      </div>
    </div>
    <div id="school-list" class="school-list">
      <div class="loading">Cargando...</div>
    </div>
  </div>

  <!-- Botón para mostrar sidebar -->
  <button id="sidebar-toggle" class="sidebar-toggle" title="Mostrar escuelas">☰ Escuelas</button>

  <!-- Panel de detalles (bottom sheet) -->
  <div id="detail-panel" class="detail-panel">
  </div>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox">
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/app.js?v=12"></script>
</body>
</html>
