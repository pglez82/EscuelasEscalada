<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Escuelas de Escalada</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/style.css" />
  <meta name="robots" content="noindex">
</head>
<body>

  <!-- Mapa -->
  <div id="map"></div>

  <!-- Sidebar (se oculta al abrir detalle en móvil) -->
  <button id="sidebar-toggle" class="sidebar-toggle" title="Mostrar escuelas">☰ Escuelas</button>
  <div id="sidebar" class="sidebar open">
    <div class="sidebar-header">
      <h1>🧗 Escuelas de Escalada</h1>
    </div>
    <div id="school-list" class="school-list">
      <div class="loading">Cargando...</div>
    </div>
  </div>

  <!-- Panel de detalles (bottom sheet) -->
  <div id="detail-panel" class="detail-panel">
  </div>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox">
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/app.js?v=1"></script>
</body>
</html>
